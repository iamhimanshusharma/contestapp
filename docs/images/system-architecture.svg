<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Contest App System Architecture</title>
  <desc id="desc">Architecture diagram showing React frontend, Express API, MongoDB, and Docker sandbox.</desc>
  <rect width="1200" height="620" fill="#F8FAFC"/>
  <text x="74" y="72" fill="#0F172A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="800">System Architecture</text>
  <text x="76" y="108" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Authenticated coding, contests, community, and sandboxed execution.</text>

  <rect x="76" y="178" width="250" height="152" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="110" y="222" fill="#0F172A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="800">React Frontend</text>
  <text x="110" y="258" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Vite + Tailwind CSS</text>
  <text x="110" y="286" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Monaco code editor</text>

  <rect x="476" y="178" width="250" height="152" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="510" y="222" fill="#0F172A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="800">Express API</text>
  <text x="510" y="258" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">JWT authentication</text>
  <text x="510" y="286" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Problems, contests, posts</text>

  <rect x="874" y="120" width="250" height="130" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="908" y="164" fill="#0F172A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="800">MongoDB</text>
  <text x="908" y="200" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Users, problems</text>
  <text x="908" y="226" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Contests, submissions</text>

  <rect x="874" y="330" width="250" height="130" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="908" y="374" fill="#0F172A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="800">Docker Sandbox</text>
  <text x="908" y="410" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Compile and run code</text>
  <text x="908" y="436" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Network disabled</text>

  <path d="M326 254H462" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  <path d="M452 242L476 254L452 266" fill="none" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="360" y="232" fill="#2563EB" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">REST API</text>

  <path d="M726 228C786 194 810 184 860 184" stroke="#16A34A" stroke-width="4" stroke-linecap="round"/>
  <path d="M838 172L864 184L840 199" fill="none" stroke="#16A34A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="748" y="180" fill="#16A34A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Mongoose</text>

  <path d="M726 282C786 342 810 390 860 394" stroke="#EA580C" stroke-width="4" stroke-linecap="round"/>
  <path d="M838 380L864 394L838 407" fill="none" stroke="#EA580C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="744" y="354" fill="#EA580C" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">docker exec</text>

  <rect x="76" y="430" width="650" height="96" rx="12" fill="#E0F2FE" stroke="#7DD3FC"/>
  <text x="110" y="468" fill="#075985" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" font-weight="800">Core workflow</text>
  <text x="110" y="500" fill="#075985" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Login -> solve/upload problems -> create/register contests -> submit code -> view results -> discuss in community</text>
</svg>
